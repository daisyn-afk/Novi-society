  <body>
    <div id="root"></div>
    <!-- Sync redirect for expired/invalid auth links before React loads (Vite must still see the module script below). -->
    <script>
      (function () {
        if (window.location.pathname === "/set-password") return;
        var hash = window.location.hash || "";
        if (!hash || hash.length < 2) return;
        var params = new URLSearchParams(hash.charAt(0) === "#" ? hash.slice(1) : hash);
        var err = params.get("error");
        var errorCode = params.get("error_code");
        if (!err && !errorCode) return;
        var qs = new URLSearchParams();
        qs.set("auth_error", "1");
        if (err) qs.set("error", err);
        if (errorCode) qs.set("error_code", errorCode);
        var desc = params.get("error_description");
        if (desc) qs.set("error_description", desc);
        window.location.replace(window.location.origin + "/set-password?" + qs.toString());
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
