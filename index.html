  <body>
    <div id="root"></div>
    <script>
      (function () {
        function bootApp() {
          var s = document.createElement("script");
          s.type = "module";
          s.src = "/src/main.jsx";
          document.body.appendChild(s);
        }

        var hash = window.location.hash || "";
        if (!hash || hash.length < 2) {
          bootApp();
          return;
        }
        if (window.location.pathname === "/set-password") {
          bootApp();
          return;
        }

        var params = new URLSearchParams(hash.charAt(0) === "#" ? hash.slice(1) : hash);
        var err = params.get("error");
        var errorCode = params.get("error_code");
        var type = (params.get("type") || "").toLowerCase();
        var accessToken = params.get("access_token");
        var hasError = !!(err || errorCode);
        var hasRecovery = (type === "recovery" || type === "invite") && accessToken;

        if (!hasError && !hasRecovery) {
          bootApp();
          return;
        }

        var root = document.getElementById("root");
        if (root) {
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f3ef;font-family:DM Sans,Helvetica,Arial,sans-serif;color:#1e2535">Opening password reset…</div>';
        }

        if (hasError) {
          var desc = params.get("error_description") || "";
          var qs = new URLSearchParams();
          qs.set("auth_error", "1");
          if (err) qs.set("error", err);
          if (errorCode) qs.set("error_code", errorCode);
          if (desc) qs.set("error_description", desc);
          window.location.replace(window.location.origin + "/set-password?" + qs.toString());
          return;
        }

        try { sessionStorage.setItem("novi_recovery_hash", hash); } catch (e) {}
        window.location.replace(window.location.origin + "/set-password?auth_recovery=1");
      })();
    </script>
  </body>
</html>
